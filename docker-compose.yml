services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tests-bundle-app
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - APP_ENV=test
    entrypoint: bash -c "composer install --no-interaction --quiet 2>/dev/null; exec bash"
    stdin_open: true
    tty: true
